name: QuantumROM Tools.

on:
  workflow_dispatch:
    inputs:
      STOCK_DEVICE:
        description: "STOCK_DEVICE_MODEL or None"
        required: true
        default: "SM-A225F"
      USE_UI_8_TETHERING_APEX:
        description: "Set True if your kernel BPF version is 5.4 (lower than 5.10)."
        required: true
        default: "False"
      TARGET_DEVICE:
        description: "TARGET_DEVICE_MODEL."
        required: true
        default: "SM-A346E"
      TARGET_DEVICE_CSC:
        description: "TARGET_DEVICE_CSC."
        required: true
        default: "BKD"
      TARGET_DEVICE_IMEI:
        description: "TARGET_DEVICE_IMEI."
        required: true
        default: "353435774197736"
      OUTPUT_FILESYSTEM:
        description: "OUTPUT_FILESYSTEM. e.g erofs / ext4"
        required: true
        default: "erofs"
      COMPRESS_IMG_TO_XZ:
        description: "Compress IMG to XZ (True/False)"
        required: true
        default: "True"

jobs:
  build:
    name: Build QuantumROM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository.
        uses: actions/checkout@v4

      - name: Cleaning junk files
        uses: rokibhasansagar/slimhub_actions@v25.42.5

      - name: Install Dependencies.
        run: |
          sudo apt install -y p7zip-full lz4 android-sdk-libsparse-utils python3 python3-pip zipalign unzip e2fsprogs openjdk-17-jdk >/dev/null 2>&1
          pip3 install git+https://github.com/martinetd/samloader.git >/dev/null 2>&1
          bash scripts/setup_directories.sh FIRMWARE WORK OUT

      - name: Download firmware.
        run: |
          source scripts/QuantumRom.sh
          DOWNLOAD_FIRMWARE "${{ github.event.inputs.TARGET_DEVICE }}" "${{ github.event.inputs.TARGET_DEVICE_CSC }}" "${{ github.event.inputs.TARGET_DEVICE_IMEI }}" "FIRMWARE"

      - name: Build Rom.
        run: |
          sudo bash sixteen.sh \
            "${{ github.event.inputs.STOCK_DEVICE }}" \
            "${{ github.event.inputs.USE_UI_8_TETHERING_APEX }}" \
            "${{ github.event.inputs.TARGET_DEVICE }}" \
            "${{ github.event.inputs.TARGET_DEVICE_CSC }}" \
            "${{ github.event.inputs.TARGET_DEVICE_IMEI }}" \
            "${{ github.event.inputs.OUTPUT_FILESYSTEM }}"

      - name: Compress & Split files before upload.
        run: |
          GIT_SUPPORT_SIZE=2147483647
          OUT_DIR="OUT"
          echo "BUILD_TIME=$(TZ='Asia/Dhaka' date '+%Y-%m-%d %I:%M:%S %p UTC+6')" >> $GITHUB_ENV
          if [ "${{ github.event.inputs.COMPRESS_IMG_TO_XZ }}" = "True" ]; then
            echo "Compressing all .img files to .xz (level 9)..."
            for img in "$OUT_DIR"/*.img; do
              [ -f "$img" ] || continue
              echo "Compressing $img"
              xz -9 -T0 "$img"
            done
          fi

          for file in "$OUT_DIR"/*; do
            [ -f "$file" ] || continue
            FILE_SIZE=$(stat -c%s "$file")
            if [ "$FILE_SIZE" -gt "$GIT_SUPPORT_SIZE" ]; then
              echo "Splitting: $file (Size: $FILE_SIZE bytes)"
              split -b "$GIT_SUPPORT_SIZE" -d -a 3 "$file" "$file.part"
              rm -f "$file"
            fi
          done

      - name: Uploading all files to GitHub Release.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_id }}"
          name: "${{ github.event.inputs.TARGET_DEVICE }} On ${{ github.event.inputs.STOCK_DEVICE }} QuantumROM Build: ${{ github.run_id }}"
          body: |
            ***Build Information***
            - ➡️ Build For: ${{ github.event.inputs.STOCK_DEVICE }}
            - ➡️ Build From: ${{ github.event.inputs.TARGET_DEVICE }}
            - ⏰️ Build Time: ${{ env.BUILD_TIME }}
          files: |
            OUT/*
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}

      - name: Clean everything.
        run: rm -rf *
